<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BIOCANN · FAQ REPROCANN · Slide 01 — Portada</title>
<link rel="stylesheet" href="../../_templates/editorial-html/tokens.css">
<link rel="stylesheet" href="../../_templates/editorial-html/components.css">
<style>
  body { background: var(--green); }
  .b-canvas { background: var(--green); padding: 96px var(--feed-margin) 80px; display: flex; flex-direction: column; }
  .b-wordmark { color: var(--white-pat); }
  .b-coord { color: var(--white-pat); opacity: 0.55; }
  .b-canvas .b-top-bar { position: static; padding: 0 0 36px 0; display: flex; }

  /* Eyebrow cobre claro sobre verde */
  .b-eyebrow { color: var(--copper-light); }

  /* Headline blanco patagónico */
  .b-headline { color: var(--white-pat); }

  /* Subhead */
  .b-subhead { color: var(--white-pat); opacity: 0.80; }

  /* Disclaimer y microcopy pie */
  .b-disclaimer { color: var(--white-pat); opacity: 0.50; }
  .b-pagination { color: var(--white-pat); opacity: 0.50; letter-spacing: 0.18em; }

  /* Bloque número editorial grande */
  .faq-numero-grande {
    font-family: var(--font-display);
    font-weight: 200;
    font-size: 180px;
    line-height: 1;
    color: var(--white-pat);
    opacity: 0.06;
    position: absolute;
    right: 48px;
    bottom: 160px;
    letter-spacing: -0.04em;
    user-select: none;
    pointer-events: none;
  }

  /* Tag de serie */
  .serie-tag {
    display: inline-block;
    font-family: var(--font-microcopy);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--copper-light);
    border: 1px solid var(--copper-light);
    border-radius: 999px;
    padding: 6px 16px;
    margin-top: 40px;
    opacity: 0.85;
  }

  /* Microcopy pie */
  .microcopy-pie {
    font-family: var(--font-microcopy);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--white-pat);
    opacity: 0.50;
  }
</style>
</head>
<body>
  <div class="b-canvas b-canvas--feed noise-overlay">

    <!-- Número grande decorativo -->
    <div class="faq-numero-grande">6</div>

    <!-- Top bar -->
    <div class="b-top-bar" style="position:static; padding:0 0 36px 0;">
      <div class="b-wordmark">BIOCANN<sup>®</sup></div>
      <div class="b-coord">42°08′S · 71°24′W · PATAGONIA</div>
    </div>

    <!-- Eyebrow -->
    <div class="b-eyebrow">CANNABIS MEDICINAL · REPROCANN · BIOCANN®</div>

    <!-- Headline portada -->
    <h1 class="b-headline b-headline--xl" style="margin-top: 80px; font-size: 72px; line-height: 1.10; max-width: 820px;">
      LAS 6 PREGUNTAS<br>
      REALES DE PACIENTES<br>
      CON <em>REPROCANN.</em>
    </h1>

    <!-- Hairline -->
    <div class="b-hairline b-hairline--lg" style="margin-top: 48px;"></div>

    <!-- Subhead -->
    <div class="b-subhead" style="margin-top: 36px; font-size: 30px; max-width: 580px;">
      Sin rodeos, sin letra chica.
    </div>

    <!-- Tag de serie -->
    <div class="serie-tag">SERIE FAQ · 01 / 06 PREGUNTAS</div>

    <div class="b-spacer"></div>

    <!-- Footer -->
    <div class="b-footer">
      <div class="microcopy-pie">BIOCANN® · CANNABIS MEDICINAL · PATAGONIA</div>
      <div class="b-pagination" style="color: var(--copper-light); opacity: 1;">01 / 08</div>
    </div>

  </div>
</body>
</html>
