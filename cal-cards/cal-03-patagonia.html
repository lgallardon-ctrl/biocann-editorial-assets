<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BIOCANN · CAL-03 | Origen Patagonia</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;700&family=Space+Grotesk:wght@300;400;500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 1080px; height: 1350px; overflow: hidden; }

  .hero {
    position: absolute; inset: 0;
    background: url('../photos/cal/cal-01-real-biocann.jpg') center 40%/cover no-repeat;
  }
  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(22,34,27,0.15) 0%,
      rgba(22,34,27,0.0) 25%,
      rgba(22,34,27,0.0) 45%,
      rgba(22,34,27,0.88) 78%,
      rgba(22,34,27,0.97) 100%
    );
  }
  .top-bar {
    position: absolute;
    top: 64px; left: 80px; right: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2;
  }
  .wordmark {
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 44px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: #F7F5F0;
  }
  .wordmark sup { font-size: 19px; vertical-align: 10px; letter-spacing: 0; }
  .coord {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(247,245,240,0.65);
  }
  .geo-stamp {
    position: absolute;
    top: 310px;
    left: 76px;
    z-index: 2;
  }
  .geo-line {
    font-family: 'Sora', sans-serif;
    font-weight: 200;
    font-size: 130px;
    line-height: 1;
    letter-spacing: -0.05em;
    color: rgba(247,245,240,0.10);
  }
  .bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 80px 72px;
    z-index: 2;
  }
  .accent-bar {
    width: 56px; height: 2px;
    background: #D6995E;
    margin-bottom: 36px;
  }
  .eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #D6995E;
    margin-bottom: 24px;
  }
  .headline {
    font-family: 'Sora', sans-serif;
    font-weight: 200;
    font-size: 96px;
    line-height: 0.93;
    letter-spacing: -0.04em;
    color: #F7F5F0;
    margin-bottom: 36px;
  }
  .subhead {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 300;
    color: rgba(247,245,240,0.70);
    line-height: 1.4;
    max-width: 700px;
    margin-bottom: 40px;
  }
  .meta-row {
    display: flex;
    align-items: center;
    gap: 32px;
  }
  .meta-pill {
    border: 1px solid rgba(214,153,94,0.5);
    padding: 10px 24px;
    flex-shrink: 0;
  }
  .meta-pill-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: rgba(214,153,94,0.85);
  }
  .disclaimer {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: rgba(247,245,240,0.32);
    line-height: 1.55;
  }
</style>
</head>
<body>
  <div class="hero"></div>
  <div class="overlay"></div>
  <div class="top-bar">
    <div class="wordmark">BIOCANN<sup>®</sup></div>
    <div class="coord">42°08′S · 71°24′W</div>
  </div>
  <div class="geo-stamp">
    <div class="geo-line">42°S</div>
    <div class="geo-line">PAT.</div>
  </div>
  <div class="bottom">
    <div class="accent-bar"></div>
    <div class="eyebrow">ORIGEN · PATAGONIA ARGENTINA</div>
    <div class="headline">Donde nace<br>el cuidado.</div>
    <div class="subhead">Cultivado en altura, bajo normas GMP, con genética registrada en INASE.</div>
    <div class="meta-row">
      <div class="meta-pill"><span class="meta-pill-text">GMP · INASE · REPROCANN</span></div>
      <div class="disclaimer">Producción bajo normativa vigente de cannabis medicinal en Argentina.</div>
    </div>
  </div>
</body>
</html>
