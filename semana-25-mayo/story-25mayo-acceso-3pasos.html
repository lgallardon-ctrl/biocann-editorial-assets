<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BIOCANN · Story 25/05 — Acceso Regulado 3 Pasos</title>
<link rel="stylesheet" href="../../_templates/editorial-html/tokens.css">
<link rel="stylesheet" href="../../_templates/editorial-html/components.css">
<style>
  body { background: var(--green); }
  .b-canvas {
    background: var(--green);
    padding: 120px var(--story-margin) 96px;
    display: flex;
    flex-direction: column;
  }
  .b-wordmark { color: var(--white-pat); }
  .b-coord { color: var(--white-pat); opacity: 0.55; }
  .b-canvas .b-top-bar { position: static; padding: 0 0 48px 0; display: flex; }
  .b-eyebrow { color: var(--copper-light); }
  .b-headline { color: var(--white-pat); }
  .b-hairline { background: var(--copper-light); }
  .b-subhead { color: var(--white-pat); opacity: 0.80; }

  .steps-row {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 48px;
  }
  .step-item {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .step-num {
    font-family: var(--font-microcopy);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--copper-light);
    opacity: 0.75;
    min-width: 32px;
  }
  .step-label {
    font-family: var(--font-microcopy);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--white-pat);
    opacity: 0.75;
  }

  .pie-story {
    font-family: var(--font-microcopy);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.30em;
    text-transform: uppercase;
    color: var(--white-pat);
    opacity: 0.50;
  }
</style>
</head>
<body>
  <div class="b-canvas b-canvas--story noise-overlay">

    <div class="b-top-bar" style="position:static; padding:0 0 48px 0;">
      <div class="b-wordmark b-wordmark--story">BIOCANN<sup>®</sup></div>
      <div class="b-coord b-coord--story">42°08′S · 71°24′W · PATAGONIA</div>
    </div>

    <div class="b-eyebrow b-eyebrow--story">ACCESO REGULADO · BIOCANN®</div>

    <h1 class="b-headline b-headline--xl" style="margin-top: 120px; font-size: 90px; line-height: 1.08; max-width: 860px;">
      3 PASOS.<br>
      <em>SIN<br>
      VUELTAS.</em>
    </h1>

    <div class="b-hairline b-hairline--lg" style="margin-top: 48px;"></div>

    <div class="steps-row">
      <div class="step-item">
        <span class="step-num">01</span>
        <span class="step-label">CONSULTA MÉDICA</span>
      </div>
      <div class="step-item">
        <span class="step-num">02</span>
        <span class="step-label">REPROCANN / DOCUMENTACIÓN</span>
      </div>
      <div class="step-item">
        <span class="step-num">03</span>
        <span class="step-label">ACCESO HABILITADO</span>
      </div>
    </div>

    <div class="b-spacer"></div>

    <div class="b-footer">
      <div style="font-family: var(--font-microcopy); font-size: 22px; letter-spacing: 0.08em; color: var(--white-pat); opacity: 0.40; margin-bottom: 8px;">Acceso sujeto a evaluación profesional y marco regulatorio vigente.</div>
      <div class="pie-story">ACCESO · REGULADO · ARGENTINA · 2026</div>
    </div>

  </div>
</body>
</html>
